<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PENSO - Registro de Ocorrências</title>
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>

<button id="theme-toggle" class="theme-toggle" aria-label="Alternar tema">🌙</button>

<div class="app-container">
    <h1 class="titulo"><i class="fas fa-clipboard-list"></i> PENSO - Ocorrências</h1>

    <!-- Painel de Autenticação (visível enquanto não logado) -->
    <div id="auth-panel" class="auth-panel">
        <div class="auth-card">
            <h3><i class="fas fa-lock"></i> Autenticação Necessária</h3>
            <div class="form-row">
                <div class="field">
                    <label>Chapa (funcional)</label>
                    <input type="text" id="auth-chapa" placeholder="Digite sua chapa" autocomplete="off">
                </div>
                <div class="field">
                    <label>PIN</label>
                    <input type="password" id="auth-pin" placeholder="Digite seu PIN">
                </div>
            </div>
            <div id="auth-error" class="error-message" style="display:none;"></div>
            <button id="btn-autenticar" class="btn-principal" style="width:100%">🔓 Autenticar</button>
        </div>
    </div>

    <!-- Conteúdo principal (formulário de ocorrência) -->
    <div id="conteudo-principal" style="display: none;">
        <div id="ocorrencia-form"></div>
        <div id="lista-rascunhos-container"></div>
        <div class="action-buttons" style="margin-top: 20px; display: flex; gap: 12px;">
            <button id="btn-salvar-rascunho-ocorrencia" class="btn-secundario" style="flex:1;">💾 Salvar Rascunho</button>
            <button id="btn-enviar-ocorrencia" class="btn-principal" style="flex:2;">📤 Finalizar Ocorrência</button>
        </div>
        <button id="btn-logout" class="logout-btn" style="margin-top: 30px;">Sair</button>
    </div>
</div>

<script src="config.js"></script>
<script src="utils.js"></script>
<script src="api.js"></script>
<script src="auth.js"></script>
<script src="ocorrencia.js"></script>
<script src="main.js"></script>
</body>
</html>
